name: Nightly Parity

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  nightly-figmai-parity:
    name: Nightly FigmAI Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run nightly parity suite
        run: |
          python -m pytest \
            tests/test_figmai_nightly_parity.py \
            tests/test_figmai_golden_parity.py \
            tests/test_figmai_golden_expanded.py \
            tests/test_output_matrix.py \
            tests/test_figmai_skills.py \
            tests/test_figmai_skills_golden.py \
            tests/test_figmai_pixel_coverage.py \
            tests/test_figma_console_ws.py \
            tests/test_figmai_chain_remote.py \
            tests/test_figmai_ir_contract.py \
            -v --tb=short

      - name: Run baseline diff report
        run: |
          python scripts/diff_against_baseline.py
